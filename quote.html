<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>ขอใบเสนอราคา</title>

    <link rel="stylesheet" href="หิน.css">

</head>

<body>

<!-- เมนู -->
<button id="menu-btn"
        class="menu-btn"
        onclick="openMenu()">
☰
</button>

<div id="sidebar" class="sidebar">

    <button class="close-btn"
            onclick="closeMenu()">
        ✕
    </button>

    <a href="index.html">หน้าแรก</a>

    <a href="products.html">สินค้า</a>

    <a href="quote.html">ขอใบเสนอราคา</a>

</div>

<!-- ฟอร์ม -->
<div class="order-container">

    <h1>ขอใบเสนอราคา</h1>

    <label>ชื่อผู้ติดต่อ</label>

    <input
        type="text"
        id="quote-name"
        placeholder="ชื่อ"
    >

    <label>เบอร์โทร</label>

    <input
        type="text"
        id="quote-phone"
        placeholder="เบอร์โทร"
    >

    <label>อีเมล</label>

    <input
        type="email"
        id="quote-email"
        placeholder="อีเมล"
    >

    <label>สาขา</label>

    <select
        id="quote-branch"
        onchange="
    loadQuoteProducts();
    loadQuoteProvinces();
"
    >

        <option value="">
            --เลือกสาขา--
        </option>

        <option value="A">
            นครพนม
        </option>

        <option value="B">
            อุบลราชธานี
        </option>

    </select>

    <label>สินค้าที่ต้องการ</label>

    <select id="quote-product">

    <option value="">
        --เลือกสินค้า--
    </option>

    </select>

    <label>จำนวน / ตร.ม.</label>

    <input
        type="text"
        id="quote-qty"
        placeholder="จำนวน"
    >

    <label>การจัดส่ง</label>

<select
    id="quote-delivery"
    onchange="toggleQuoteAddress()"
>

    <option value="">
        --เลือกการจัดส่ง--
    </option>

    <option value="pickup">
        รับหน้าร้าน
    </option>

    <option value="delivery">
        ให้ร้านจัดส่ง
    </option>

</select>

    <div id="quote-address-box"
     style="display:none;">

    <label>จังหวัด</label>

    <select
        id="quote-province"
        onchange="loadQuoteAmphures()"
    >

        <option value="">
            เลือกจังหวัด
        </option>

    </select>

    <label>อำเภอ</label>

    <select
    id="quote-amphure"
    onchange="loadQuoteDistricts()"
    >

        <option value="">
            เลือกอำเภอ
        </option>

    </select>

    <label>ตำบล</label>

    <select id="quote-district">

        <option value="">
            เลือกตำบล
        </option>

    </select>

    <label>ที่อยู่</label>

    <textarea
        id="quote-address"
        placeholder="ที่อยู่"
    ></textarea>

</div>

    <label>รายละเอียดเพิ่มเติม</label>

    <textarea
        id="quote-detail"
        placeholder="รายละเอียดเพิ่มเติม"
    ></textarea>

    <button onclick="sendQuote()"
            class="confirm-btn">

        ส่งคำขอใบเสนอราคา

    </button>

</div>

<script>

function sendQuote() {

    let name =
    document.getElementById(
        "quote-name"
    ).value;

    let phone =
    document.getElementById(
        "quote-phone"
    ).value;

    let email =
    document.getElementById(
        "quote-email"
    ).value;

    let product =
    document.getElementById(
        "quote-product"
    ).value;

    let qty =
    document.getElementById(
        "quote-qty"
    ).value;

    let province =
    document.getElementById(
        "quote-province"
    ).value;

    let address =
    document.getElementById(
        "quote-address"
    ).value;

    let detail =
    document.getElementById(
        "quote-detail"
    ).value;

    if (
        !name ||
        !phone ||
        !product
    ) {

        alert("กรุณากรอกข้อมูลให้ครบ");

        return;
    }

    fetch(
    "ใส่URLAppsScriptตรงนี้",

    {

        method: "POST",

        mode: "no-cors",

        body: new URLSearchParams({

            name: name,

            phone: phone,

            email: email,

            product: product,

            qty: qty,

            province: province,

            address: address,

            detail: detail
        })
    });

    alert("ส่งคำขอเรียบร้อย");

    window.location.href =
    "index.html";
}

const branchProvinces = {

    A: [

        "นครพนม",

        "สกลนคร",

        "บึงกาฬ",

        "มุกดาหาร"
    ],

    B: [

        "อุบลราชธานี",

        "ศรีสะเกษ",

        "อำนาจเจริญ"
    ]
};

const quoteProducts = {

    A: [

        "หินกาบดำ",

        "หินทรายเขียว",

        "หินทรายเหลืองลาย"
    ],

    B: [

        "หินกาบดำ",

        "หินทรายเขียว",

        "หินทรายเหลืองทอง"
    ]
};

function loadQuoteProducts() {

    let branch =
    document.getElementById(
        "quote-branch"
    ).value;

    let productSelect =
    document.getElementById(
        "quote-product"
    );

    productSelect.innerHTML = `
    <option value="">
        --เลือกสินค้า--
    </option>
    `;

    if (!branch) return;

    quoteProducts[branch]
    .forEach(product => {

        productSelect.innerHTML += `
        <option value="${product}">
            ${product}
        </option>
        `;
    });
}

function loadQuoteProvinces() {

    let branch =
    document.getElementById(
        "quote-branch"
    ).value;

    let provinceSelect =
    document.getElementById(
        "quote-province"
    );

    fetch("provinces.json")

    .then(res => res.json())

    .then(data => {

        provinceSelect.innerHTML =
        `
        <option value="">
        เลือกจังหวัด
        </option>
        `;

        let allowed =
        branchProvinces[branch]
        || [];

        let filtered =
        data.filter(item =>

            allowed.includes(
                item.name_th
            )
        );

        filtered.forEach(item => {

            provinceSelect.innerHTML += `
            <option value="${item.id}">
                ${item.name_th}
            </option>
            `;
        });
    });
}

function loadQuoteAmphures() {

    let provinceId =
    document.getElementById(
        "quote-province"
    ).value;

    fetch("districts.json")

    .then(res => res.json())

    .then(data => {

        let html =
        `
        <option value="">
        เลือกอำเภอ
        </option>
        `;

        let filtered =
        data.filter(item =>

            item.province_id ==
            provinceId
        );

        filtered.forEach(item => {

            html += `
            <option value="${item.id}">
                ${item.name_th}
            </option>
            `;
        });

        document.getElementById(
            "quote-amphure"
        ).innerHTML = html;
    });
}

function loadQuoteDistricts() {

    let amphureId =
    document.getElementById(
        "quote-amphure"
    ).value;

    fetch("sub_districts.json")

    .then(res => res.json())

    .then(data => {

        let html =
        `
        <option value="">
        เลือกตำบล
        </option>
        `;

        let filtered =
        data.filter(item =>

            item.district_id ==
            amphureId
        );

        filtered.forEach(item => {

            html += `
            <option value="${item.name_th}">
                ${item.name_th}
            </option>
            `;
        });

        document.getElementById(
            "quote-district"
        ).innerHTML = html;
    });
}

function toggleQuoteAddress() {

    let delivery =
    document.getElementById(
        "quote-delivery"
    ).value;

    let box =
    document.getElementById(
        "quote-address-box"
    );

    if (delivery === "จัดส่ง") {

        box.style.display =
        "block";
    }

    else {

        box.style.display =
        "none";
    }
}

</script>

<script src="หิน.js"></script>

</body>
</html>
