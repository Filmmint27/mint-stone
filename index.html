<body>

    <div class="navbar">

        <div class="cart-icon" onclick="toggleCart()">
             🛒 <span id="cart-count">0</span>

    </div>
    <div id="cart-popup" class="cart-popup" style="display:none;">
        <h3>🛒 ตะกร้าสินค้า</h3>
        <div id="cart-items"></div>
        <p>รวม: <span id="cart-total">0</span> บาท</p>
   
        <button onclick="goToCart()">ไปหน้าตะกร้า</button>
    </div>
    <p class="banner"> เลือกสาขาเพื่อสั่งสินค้า </p>

    <h2>เลือกสาขา</h2>
    <button class="branch-btn" onclick="showBranch('A')">สาขา นครพนม</button>
    <button class="branch-btn" onclick="showBranch('B')">สาขา อุบลราชธานี</button>

    <div class="container" id="product-container">
        <p>กรุณาเลือกสาขา</p>
      
      <p>หมายเหตุ : ทางร้านจัดส่งให้ได้แค่สาขาที่อยู่ใกล้บ้านท่าน</p>
    </div>
    <div id="shipping-area"></div>

<script>
        let shippingText = "";

        let currentProduct = "";
        let currentPrice = 0;
        let qty = 1;

        function showBranch(branch) {
            let html = "";

            if (branch === "A") {
                html = `
                
                <h2>สาขา นครพนม</h2>

                <div class="card">
                    <img src="หินกาบดำ.jpg">
                    <h3>หินกาบดำ</h3>
                    <p>ราคา 450 บาท/ตร.ม.</p>
                    <button onclick="openPopup('หินกาบดำ', 450, 'A')">ซื้อ</button>
                </div>

                <div class="card">
                    <img src="หินทรายเขียว.jpg">
                    <h3>หินทรายเขียว</h3>
                    <p>ราคา 450 บาท/ตร.ม.</p>
                    <button onclick="openPopup('หินทรายเขียว', 450, 'A')">ซื้อ</button>
                </div>

                <div class="card">
                    <img src="หินทรายเหลืองลาย.jpg">
                    <h3>หินทรายเหลืองลาย</h3>
                    <p>ราคา 280 บาท/ตร.ม.</p>
                    <button onclick="openPopup('หินทรายเหลืองลาย', 280, 'A')">ซื้อ</button>
                </div>
                `;

                shippingText = "🚚 จัดส่ง: นครพนม, สกลนคร, มุกดาหาร, บึงกาฬ";
            }
        
            if (branch === "B") {
                html = `
                <h2>สาขา อุบลราชธานี</h2>

                <div class="card">
                    <img src="หินกาบดำ.jpg">
                    <h3>หินกาบดำ</h3>
                    <p>ราคา 450 บาท/ตร.ม.</p>
                    <button onclick="openPopup('หินกาบดำ', 450, 'B')">ซื้อ</button>
                </div>

                <div class="card">
                    <img src="หินทรายเขียว.jpg">
                    <h3>หินทรายเขียว</h3>
                    <p>ราคา 450 บาท/ตร.ม.</p>
                    <button onclick="openPopup('หินทรายเขียว', 450, 'B')">ซื้อ</button>
                </div>

                <div class="card">
                    <img src="หินทรายเหลืองทอง.jpg">
                    <h3>หินทรายเหลืองทอง</h3>
                    <p>ราคา 250 บาท/ตร.ม.</p>
                    <button onclick="openPopup('หินทรายเหลืองทอง', 250, 'B')">ซื้อ</button>
                </div>
                `;

                shippingText = "🚚 จัดส่ง: อุบลราชธานี, ยโสธร, อำนาจเจริญ";
            }
        document.getElementById("product-container").innerHTML = html;
        document.getElementById("shipping-area").innerText = shippingText;
        }

function openPopup(name, price, branch) {
    currentProduct = name;
    currentPrice = price;
    currentBranch = branch;
    qty = 1;

    document.getElementById("popup-name").innerText = name;
    document.getElementById("popup-qty").innerText = qty;

    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function increasePopup() {
    qty++;
    document.getElementById("popup-qty").innerText = qty;
}

function decreasePopup() {
    if (qty > 1) {
        qty--;
        document.getElementById("popup-qty").innerText = qty;
    }
}
</script>

<div id="popup" class="popup">
    <div class="popup-box">
      <h3 id="popup-name"></h3>
  
      <div class="qty-box">
        <button onclick="decreasePopup()">-</button>
        <span id="popup-qty">1</span>
        <button onclick="increasePopup()">+</button>
      </div>
  
      <br>
    <button onclick="closePopup()">ยกเลิก</button>
      <button type="button" onclick="confirmBuy()">ยืนยัน</button>
    </div>
</div>
